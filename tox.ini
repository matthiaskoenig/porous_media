[tox]
envlist = mypy, py3.{13,14}

[testenv]
package = wheel
wheel_build_env = .pkg
deps=
    pytest
    pytest-raises
commands =
    pytest

[testenv:install]
skip_install = True
deps=
    build
    twine
commands=
    pip check {toxinidir}
    python -m build {toxinidir}
    twine check {toxinidir}/dist/*

[testenv:mypy]
skip_install = True
deps=
    mypy
    rich
    pytest
    numpy
    xarray
    matplotlib
    pyvista
    jinja2
    pandas-stubs
commands=
    mypy {toxinidir}/src/porous_media {toxinidir}/tests --config-file tox.ini

[pytest]
testpaths =
    tests
markers =
    raises

[mypy]
warn_return_any = True
follow_imports = silent
disallow_untyped_defs = True
disallow_incomplete_defs = True

[mypy-meshio.*]
ignore_missing_imports = True

[mypy-geojson.*]
ignore_missing_imports = True

[mypy-descartes.*]
ignore_missing_imports = True

[mypy-dataclasses_json.*]
ignore_missing_imports = True

[mypy-porous_media.analyses.spt.lobulus_composition]
ignore_errors = True
